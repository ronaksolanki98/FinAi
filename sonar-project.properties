# Organization (SonarCloud)
sonar.organization=ronak-cn-98

# Project identification
sonar.projectKey=ronak-cn-98_fin.ai-3tier
sonar.projectName=fin.ai-3tier
sonar.projectVersion=1.0

# SonarCloud server
sonar.host.url=https://sonarcloud.io

sonar.sources=client,server,shared

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=node_modules/**,dist/**,.github/**,infra/**,.terraform/**

# Force TypeScript analyzer
sonar.javascript.enabled=false
sonar.typescript.enabled=true

# TS config
sonar.typescript.tsconfigPath=tsconfig.json