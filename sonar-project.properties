# Organization (SonarCloud)
sonar.organization=ronak-cn-98

# Project identification
sonar.projectKey=ronak-cn-98_fin.ai-3tier
sonar.projectName=fin.ai-3tier
sonar.projectVersion=1.0

# SonarCloud server
sonar.host.url=https://sonarcloud.io

# Language configuration
sonar.javascript.file.suffixes=.js,.ts,.tsx

# Source directories
sonar.sources=client,server,shared

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude generated or irrelevant files
sonar.exclusions=node_modules/**,dist/**,.github/**,.terraform/**,infra/**,coverage/**

# Test detection
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Typescript config
sonar.typescript.tsconfigPath=tsconfig.json