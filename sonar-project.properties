# Organization (SonarCloud)
sonar.organization=ronak-cn-98

# Project identification
sonar.projectKey=ronak-cn-98_fin.ai-3tier
sonar.projectName=fin.ai-3tier
sonar.projectVersion=1.0

# SonarCloud server
sonar.host.url=https://sonarcloud.io

# Source code location
sonar.sources=client,server,shared

# Encoding
sonar.sourceEncoding=UTF-8

# Language configuration
sonar.javascript.file.suffixes=.js,.ts,.tsx

# Exclusions
sonar.exclusions=node_modules/**,dist/**,.github/**,.terraform/**,infra/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.json